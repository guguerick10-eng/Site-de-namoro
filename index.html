
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Site de Namoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Nosso Amor, Nosso Tempo</h1>
        <p id="timer"></p>
    </header>
    <section>
        <h2>Momentos Especiais</h2>
        <img src="foto1.jpg" alt="Foto de Nós">
        <p>Juntos desde 10/04/2025</p>
    </section>
    <section>
        <h2>Mensagem para Jéssica</h2>
        <textarea id="message" placeholder="Deixe uma mensagem, Jéssica..."></textarea>
        <button onclick="saveMessage()">Salvar Mensagem</button>
        <p id="last-message"></p>
    </section>
    <audio autoplay loop>
        <source src="Matheus _ Kauan - Amor Sem Medida (Te Voy A Amar)(MP3_160K).mp3" type="audio/mp3">
    </audio>
    <script src="script.js"></script>
</body>
</html>
